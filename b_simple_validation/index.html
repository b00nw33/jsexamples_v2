<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- Ask user for 8 digit phone number -->
    <form id="formPhone">
        <label for="txtInput">Please enter your 8-digit phone number:</label>
        <input type="text" id="txtInput">
        <button type="submit">Submit</button>
    </form>


    <!-- Internal script to process user input -->
     <script>
        // Use of DOM to process the form input
        const form = document.querySelector("form").addEventListener("submit", e => {
            e.preventDefault();
            // console.log(e.target.id);

            let result = document.getElementById("txtInput").value;

            if (isNaN(result)) return alert("You did not enter a number!!");

            if (result.length != 8) return alert("Please enter a 8-digit phone number!");

            return alert(`Thank you. We will call you at +65-${result} shortly.`);
        });
     </script>

</body>
</html>
